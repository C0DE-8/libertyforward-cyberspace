services:
  mysql:
    image: mysql:8.4
    container_name: lfc-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: lfc_root_2024
      MYSQL_DATABASE: lfc_cyberspace
    volumes:
      - lfc_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-plfc_root_2024"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lfc_mysql_data:
